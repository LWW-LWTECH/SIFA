<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFA | Sample</title>

    <style>
        form{
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
        .sifa-input{
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<form id="textform">
  <div class="sifa-input" id="full_name">
    <label for="name">Full name</label>
    <input type="text" id="name" name="name" placeholder="Jane Smith" />
  </div>

  <div class="sifa-input" data-tag="email">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" placeholder="jane@example.com" />
  </div>

  <div class="sifa-input">
    <label for="age">Age</label>
    <input type="number" id="age" name="age" min="0" max="120" />
  </div>

  <div class="sifa-input">
    <label for="age2">Age</label>
    <input type="range" id="age2" name="age2" min="0" max="120" />
  </div>

  <div class="sifa-input">
    <label for="week">Week</label>
    <input type="week" id="week" name="week" />
  </div>

  <div class="sifa-input">
    <label for="month">Month</label>
    <input type="month" id="month" name="month" />
  </div>

  <div class="sifa-input">
    <label for="color">Color</label>
    <input type="color" id="color" name="color" />
  </div>

  <div class="sifa-input">
    <label for="country">Country</label>
    <select id="country" name="country">
      <option value="">Select a country...</option>
      <option value="us">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="ca">Canada</option>
    </select>
  </div>

  <div class="sifa-input">
    <label for="country2">Country</label>
    <select id="country2" name="country2" multiple>
      <option value="">Select a country...</option>
      <option value="us">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="ca">Canada</option>
    </select>
  </div>

  <details id="addinfo">
    <summary>Additional Information</summary>
    <div class="sifa-input">
        <label for="additional_info">Please provide any additional information:</label>
        <textarea id="additional_info" name="additional_info" rows="4"></textarea>
    </div>
  </details>

  <section id="moreops">
    <div class="sifa-input">
        <label>Gender</label>
        <label><input type="radio" name="gender" value="male" /> Male</label>
        <label><input type="radio" name="gender" value="female" /> Female</label>
        <label><input type="radio" name="gender" value="other" /> Prefer not to say</label>
    </div>

    <div class="sifa-input">
        <label>Interests</label>
        <label><input type="checkbox" name="interests" value="tech" /> Technology</label>
        <label><input type="checkbox" name="interests" value="sports" /> Sports</label>
        <label><input type="checkbox" name="interests" value="music" /> Music</label>
    </div>

    <div class="sifa-input">
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob" />
    </div>

    <div class="sifa-input">
        <label for="comments">Additional comments</label>
        <textarea id="comments" name="comments" rows="4"></textarea>
    </div>

    <div class="sifa-input">
        <label>
        <input type="checkbox" name="terms" /> I agree to the terms and conditions
        </label>
    </div>
    <span class="sifa-input">
        <button>Submit</button>
    </span>
  </section>
</form>

<body>
    <script type="module" async>
        let sifaLib = await import("../sifa.engine.js?ts=" + Math.floor(Math.random() * 1984) * new Date().getTime());

        // LOAD, INPUT, CHANGE, SAVE
        let sifa = new sifaLib.SifaEngine({
            "debug": false,
            "events":{
                "LOAD": (output)=>{
                    // console.log('Custom Load Event', output);
                },
                "CHANGE": (ele, output)=>{
                    // console.log('Custom Change Event', ele, output);
                },
                "SAVE": (output)=>{
                    // console.log('Custom Save Event', output);
                }
            },
            "variables":{"form_name":"Employee Form"},
            "priceRules": [
                {
                    'method':'sifa_costPlusPrice',
                    "enable":true,
                    'condition': 'true',
                    'set':{'value':200, 'type':'percent'}
                }
            ],
            "answers":{
                "field_age2": "0",
                "field_name": "John Doe",
                "field_color": "#ff0000",
                "field_age": "30",
                "field_month": "2024-01",
                "field_week": "2024-W01",
                "field_country": "us",
                "field_country2": ["us","ca"],
                "field_gender": "male",
                "field_interests": ["tech","music"],
                "field_dob": "1990-01-01",
                "field_comments": "No comments",
                "field_terms": "on"
            },
            "rules": [
                {
                    "group":"onload",
                    "enable":true,
                    "event":"LOAD",
                    "rules":[
                        {
                            "ref":"ruleset0",
                            "desc":"",
                            "priority":1,
                            "enable":true,
                            "active":"true",         // true condition to activate the rule
                            "condition": "true",     // condition to set true or false
                            "true_actions":[
                                'sifa_triggerRule("ruleset2")'
                            ],
                            "false_actions":[]
                        }
                    ]
                },
                {
                    "group":"onload",
                    "enable":true,
                    "event":"CHANGE",
                    "rules":[
                        { 
                            "ref":"ruleset2",
                            "desc":"",
                            "priority":1,
                            "enable":true,
                            "active":"true",         // true condition to activate the rule
                            "condition": "true",     // condition to set true or false
                            "true_actions":[
                                `sifa_addBomItem('field_country', {
                                    'sku':'RACK-001',
                                    'parent_sku':'ROOM-001',
                                    'description':'Rack system 4x7', 
                                    'quantity':4,
                                    'vendor':'THD',
                                    'unitcost':159.00
                                })`,
                                `sifa_addBomItem('field_country2', {
                                    'sku':'RACK-002',
                                    'parent_sku':'ROOM-001',
                                    'description':'Rack system 4x7', 
                                    'quantity':1,
                                    'vendor':'THD',
                                    'unitcost':115.00
                                })`,
                                'sifa_removeBomItem("RACK-001_1")'
                            ],
                            "false_actions":[]
                        }
                    ]
                }
            ],
            "validationRules":[
                {
                    "ref":"valid1",
                    "desc":"",
                    "enable":true,
                    
                    "condition": "sifa_inputHasValue('field_name')",
                    "true_message":"",
                    "false_message":"Please select a predefined option"
                },
                {
                    "ref":"valid2",
                    "desc":"",
                    "enable":true,
                    
                    "condition": "sifa_inputHasValue('field_email')",
                    "true_message":"",
                    "false_message":"Please select a Front Module 111 color"
                }
            ]
        });

        let textform = document.getElementById('textform');
        textform.addEventListener('submit', async (e) => {
            e.preventDefault();
            await SIFA.onSaveEvent(['log', 'ans', 'var', 'val']);
            // console.log(answer);
        });
    </script>
</body>
</html>
